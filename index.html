<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Site</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: #111;
  color: white;
}

.hero {
  height: 100vh;
  background-image: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6');
  background-size: cover;
  background-position: center;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-size: 60px;
  background: rgba(0,0,0,0.4);
  padding: 20px 40px;
  border-radius: 10px;
}

.section {
  padding: 80px 20px;
  text-align: center;
}

.btn {
  display: inline-block;
  padding: 15px 30px;
  background: gold;
  color: black;
  text-decoration: none;
  margin-top: 20px;
  border-radius: 5px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="hero">
  <h1>My Website</h1>
</div>

<div class="section">
  <h2>About</h2>
  <p>This is my modern website.</p>
  <a href="#" class="btn">Contact</a>
</div>

</body>
</html>
